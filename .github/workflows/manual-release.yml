name: Manual Release Candidate Generation

on:
  workflow_dispatch:
    inputs:
      tag-system:
        description: "libbitcoin-system tag used for release generation."
        required: true
        type: string
      tag-database:
        description: "libbitcoin-database tag used for release generation."
        required: true
        type: string
      tag-network:
        description: "libbitcoin-network tag used for release generation."
        required: true
        type: string
      tag-node:
        description: "libbitcoin-node tag used for release generation."
        required: true
        type: string
      tag-server:
        description: "libbitcoin-server tag used for release generation."
        required: true
        type: string

permissions:
  contents: read

jobs:

  validate-tags:
    runs-on: ubuntu-latest

    steps:
      - name: checkout server
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          path: 'libbitcoin-server'
          ref: ${{ github.event.inputs.tag-server }}
          repository: ${{ github.repository }}

      - name: checkout node
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          path: 'libbitcoin-node'
          ref: ${{ github.event.inputs.tag-node }}
          repository: ${{ github.repository_owner }}/libbitcoin-node

      - name: checkout network
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          path: 'libbitcoin-network'
          ref: ${{ github.event.inputs.tag-network }}
          repository: ${{ github.repository_owner }}/libbitcoin-network

      - name: checkout database
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          path: 'libbitcoin-database'
          ref: ${{ github.event.inputs.tag-database }}
          repository: ${{ github.repository_owner }}/libbitcoin-database

      - name: checkout system
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          path: 'libbitcoin-system'
          ref: ${{ github.event.inputs.tag-system }}
          repository: ${{ github.repository_owner }}/libbitcoin-system

      - name: Verify tag server
        shell: bash
        working-directory: libbitcoin-server
        run: |
          if ! git rev-parse --verify "refs/tags/${{ github.event.inputs.tag-server }}" > /dev/null 2>&1; then
            echo "Tag '${{ github.event.inputs.tag-server }}' does not exist in the repository."
            exit 1
          fi
          echo "Validated tag '${{ github.event.inputs.tag-server }}'."

      - name: Verify tag node
        shell: bash
        working-directory: libbitcoin-node
        run: |
          if ! git rev-parse --verify "refs/tags/${{ github.event.inputs.tag-node }}" > /dev/null 2>&1; then
            echo "Tag '${{ github.event.inputs.tag-node }}' does not exist in the repository."
            exit 1
          fi
          echo "Validated tag '${{ github.event.inputs.tag-node }}'."

      - name: Verify tag network
        shell: bash
        working-directory: libbitcoin-network
        run: |
          if ! git rev-parse --verify "refs/tags/${{ github.event.inputs.tag-network }}" > /dev/null 2>&1; then
            echo "Tag '${{ github.event.inputs.tag-network }}' does not exist in the repository."
            exit 1
          fi
          echo "Validated tag '${{ github.event.inputs.tag-network }}'."

      - name: Verify tag database
        shell: bash
        working-directory: libbitcoin-database
        run: |
          if ! git rev-parse --verify "refs/tags/${{ github.event.inputs.tag-database }}" > /dev/null 2>&1; then
            echo "Tag '${{ github.event.inputs.tag-database }}' does not exist in the repository."
            exit 1
          fi
          echo "Validated tag '${{ github.event.inputs.tag-database }}'."

      - name: Verify tag system
        shell: bash
        working-directory: libbitcoin-system
        run: |
          if ! git rev-parse --verify "refs/tags/${{ github.event.inputs.tag-system }}" > /dev/null 2>&1; then
            echo "Tag '${{ github.event.inputs.tag-system }}' does not exist in the repository."
            exit 1
          fi
          echo "Validated tag '${{ github.event.inputs.tag-system }}'."

  build-candidates:

    needs: validate-tags

    outputs:
      candidate_identifier: ${{ steps.normalizer.outputs.candidate_identifier }}

    runs-on: ${{ matrix.image }}

    strategy:
      fail-fast: false

      matrix:
        include:
          - image: ubuntu-latest
            toolchain: gnu
            cc: "gcc"
            cxx: "g++"
            configuration: debug
            link: static
            options: "--enable-avx2"
            basename: "bs-nix-StaticDebug"

          - image: ubuntu-latest
            toolchain: cmake
            cc: "clang"
            cxx: "clang++"
            configuration: release
            link: static
            options: "-Denable-avx2=ON"
            basename: "bs-nix-StaticRelease"

          - image: ubuntu-latest
            toolchain: cmake
            cc: "clang"
            cxx: "clang++"
            configuration: debug
            link: static
            options: "-Denable-shani=ON"
            basename: "bs-nix-StaticDebug-shani"

          - image: ubuntu-latest
            toolchain: gnu
            cc: "gcc"
            cxx: "g++"
            configuration: release
            link: static
            options: "--enable-shani"
            basename: "bs-nix-StaticRelease-shani"

          - image: ubuntu-latest
            toolchain: gnu
            cc: "gcc"
            cxx: "g++"
            configuration: debug
            link: static
            options: "--enable-avx512"
            basename: "bs-nix-StaticDebug-avx512"

          - image: ubuntu-latest
            toolchain: cmake
            cc: "clang"
            cxx: "clang++"
            configuration: release
            link: static
            options: "-Denable-avx512=ON"
            basename: "bs-nix-StaticRelease-avx512"

          - image: windows-latest
            toolchain: msbuild
            configuration: StaticDebug
            platform: "x64"
            version: "vs2022"
            basename: "bs-win64-StaticDebug"

          - image: windows-latest
            toolchain: msbuild
            configuration: StaticRelease
            platform: "x64"
            version: "vs2022"
            basename: "bs-win64-StaticRelease"

          - image: windows-latest
            toolchain: msbuild
            configuration: StaticDebug
            platform: "x64"
            version: "vs2022"
            options: "--enable-shani"
            basename: "bs-win64-StaticDebug-shani"

          - image: windows-latest
            toolchain: msbuild
            configuration: StaticRelease
            platform: "x64"
            version: "vs2022"
            options: "--enable-shani"
            basename: "bs-win64-StaticRelease-shani"

    steps:
      - name: checkout server
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          path: 'libbitcoin-server'
          ref: ${{ github.event.inputs.tag-server }}
          repository: ${{ github.repository }}

      - name: checkout node
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          path: 'libbitcoin-node'
          ref: ${{ github.event.inputs.tag-node }}
          repository: ${{ github.repository_owner }}/libbitcoin-node

      - name: checkout network
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          path: 'libbitcoin-network'
          ref: ${{ github.event.inputs.tag-network }}
          repository: ${{ github.repository_owner }}/libbitcoin-network

      - name: checkout database
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          path: 'libbitcoin-database'
          ref: ${{ github.event.inputs.tag-database }}
          repository: ${{ github.repository_owner }}/libbitcoin-database

      - name: checkout system
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          path: 'libbitcoin-system'
          ref: ${{ github.event.inputs.tag-system }}
          repository: ${{ github.repository_owner }}/libbitcoin-system

      - name: Prepare toolchain [linux]
        if: ${{ startsWith(matrix.image, 'ubuntu') }}
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.packages || '' }} git build-essential autoconf automake libtool pkg-config

      - name: Prepare toolchain [macos]
        if: ${{ startsWith(matrix.image, 'macos') }}
        shell: bash
        run: |
          brew install ${{ matrix.packages || '' }} autoconf automake libtool
          if [[ -n "${{ matrix.llvm }}" ]]; then
            echo "PATH=/opt/homebrew/opt/${{ matrix.llvm }}/bin:${PATH}" >> $GITHUB_ENV
          fi

      - name: Prepare toolchain [windows]
        if: ${{ startsWith(matrix.image, 'windows') }}
        uses: microsoft/setup-msbuild@v3
        with:
          msbuild-architecture: x64

      - name: Environmental Variable Computation
        if: ${{ matrix.toolchain == 'cmake' || matrix.toolchain == 'gnu' || matrix.toolchain == 'presets' }}
        shell: bash
        run: |
          if [[ "${{ matrix.link }}" == "dynamic" ]]; then
              echo "LDFLAGS=-Wl,-rpath,${{ github.workspace }}/prefix/lib" >> $GITHUB_ENV
          fi

      - name: Execute build [cmake]
        if: ${{ matrix.toolchain == 'cmake' }}
        shell: bash
        run: >
          ./libbitcoin-server/builds/cmake/install-cmake.sh
          --build-use-local-src
          --build-src-dir="${{ github.workspace }}"
          --prefix="${{ github.workspace }}/prefix"
          --build-obj-dir="obj"
          --build-obj-dir-relative
          --build-config="${{ matrix.configuration }}"
          --build-link="${{ matrix.link }}"
          --build-skip-tests
          --build-boost
          --build-secp256k1
          ${{ matrix.options }}

      - name: Execute build [gnu]
        if: ${{ matrix.toolchain == 'gnu' }}
        shell: bash
        run: >
          ./libbitcoin-server/builds/gnu/install-gnu.sh
          --build-use-local-src
          --build-src-dir="${{ github.workspace }}"
          --prefix="${{ github.workspace }}/prefix"
          --build-obj-dir="obj"
          --build-obj-dir-relative
          --build-config="${{ matrix.configuration }}"
          --build-link="${{ matrix.link }}"
          --build-skip-tests
          --build-boost
          --build-secp256k1
          ${{ matrix.options }}

      - name: Execute build [msbuild]
        if: ${{ matrix.toolchain == 'msbuild' }}
        shell: cmd
        run: >
          .\libbitcoin-server\builds\msvc\build-msvc.cmd
          --build-src-dir "${{ github.workspace }}"
          --build-config ${{ matrix.configuration }}
          --build-platform ${{ matrix.platform }}
          --build-version ${{ matrix.version }}
          --build-use-local-src
          --build-skip-tests
          ${{ matrix.options }}

      - name: Execute build [presets]
        if: ${{ matrix.toolchain == 'presets' }}
        shell: bash
        run: >
          ./libbitcoin-server/builds/cmake/install-presets.sh
          --build-use-local-src
          --build-src-dir="${{ github.workspace }}"
          --build-preset="${{ matrix.preset }}"
          --build-skip-tests
          --build-boost
          --build-secp256k1
          ${{ matrix.options }}

      - name: Normalize output location
        id: normalizer
        shell: bash
        run: |
          mkdir candidate
          if [[ "${{ matrix.toolchain }}" == "cmake" ]]; then
              CANDIDATE="prefix/bin/bs"
              CANONICAL="${{ matrix.basename }}"
          elif [[ ${{ matrix.toolchain }} == "gnu" ]]; then
              CANDIDATE="prefix/bin/bs"
              CANONICAL="${{ matrix.basename }}"
          elif [[ ${{ matrix.toolchain }} == "presets" ]]; then
              CANDIDATE="prefix/${{ matrix.preset }}/bin/bs"
              CANONICAL="${{ matrix.basename }}"
          elif [[ ${{ matrix.toolchain }} == "msbuild" ]]; then
              if [[ "${{ matrix.configuration }}" == *Debug* ]]; then
                  CONFIG="Debug"
              elif [[ "${{ matrix.configuration }}" == *Release* ]]; then
                  CONFIG="Release"
              else
                  echo "Configuration unexpected."
                  exit 1
              fi
              CANDIDATE="libbitcoin-server/bin/x64/${CONFIG}/v143/static/bs.exe"
              CANONICAL="${{ matrix.basename }}.exe"
          else
              echo "\e[0;91mUnexpected toolchain provided.\e[0m"
              exit 1
          fi

          cp --dereference --no-clobber ${CANDIDATE} candidate/${CANONICAL}
          echo "candidate_identifier=${CANONICAL}" >> "$GITHUB_OUTPUT"

      - name: Strip symbols from binaries
        if: ${{ matrix.configuration != 'debug' && matrix.toolchain != 'msbuild' }}
        shell: bash
        run: |
          echo "Stripping debug symbols to reduce binary size..."
          find candidate -type f \
            \( -perm -111 -o -name "*.so" -o -name "*.dylib" \) \
            ! -path "*/.git/*" \
            ! -name "*.a" \
            -exec sh -c '
              file "{}" | grep -qE "ELF|Mach-O|PE32" &&
              strip --strip-unneeded --preserve-dates "{}" &&
              echo "Stripped: {}"
              ' \; || true

      - name: Inventory results
        working-directory: candidate
        shell: bash
        run: |
          ls -lahR

      - name: Upload artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ steps.normalizer.outputs.candidate_identifier }}
          path: candidate/*
          retention-days: 1
          if-no-files-found: error

  sign:
    name: Sign artifacts
    needs: build-candidates
    environment: release
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Retrieve artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: artifacts

      - name: GPG Keyring Initialization
        id: gpg-init
        env:
          SIGNING_PRIVATE_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSPHRASE: ${{ secrets.SIGNING_PASSPHRASE }}
        run: |
          echo "Importing GPG signing key..."

          # Import private key
          echo "$SIGNING_PRIVATE_KEY" | gpg --batch --import --pinentry-mode loopback

          # Extract full fingerprint
          KEY_FINGERPRINT=$(gpg --list-secret-keys --with-colons --fingerprint \
            | grep '^fpr' | head -n1 | cut -d: -f10)

          if [ -z "$KEY_FINGERPRINT" ]; then
            echo "Error: No secret key found after import"
            exit 1
          fi

          echo "Imported key fingerprint: $KEY_FINGERPRINT"

          # Set ultimate trust
          echo -e "5\ny\n" | gpg --batch --command-fd 0 --edit-key "$KEY_FINGERPRINT" trust >/dev/null 2>&1

          # Configure gpg-agent
          mkdir -p ~/.gnupg
          cat > ~/.gnupg/gpg-agent.conf << 'EOF'
            allow-loopback-pinentry
            default-cache-ttl 3600
            max-cache-ttl 7200
          EOF

          echo "use-agent" > ~/.gnupg/gpg.conf

          # Restart agent
          gpgconf --kill gpg-agent
          gpgconf --launch gpg-agent

          # Pre-cache passphrase (after agent is ready)
          echo "$SIGNING_PASSPHRASE" | \
            gpg \
              --batch \
              --pinentry-mode loopback \
              --passphrase-fd 0 \
              --sign \
              --output /dev/null \
              --detach-sign /dev/null \
              2>/dev/null || true

          echo "key_fingerprint=$KEY_FINGERPRINT" >> $GITHUB_OUTPUT
          echo "GPG key imported and passphrase cached successfully."

      - name: execute signature
        id: gpg-sign
        working-directory: artifacts
        shell: bash
        env:
          KEY_FINGERPRINT: ${{ steps.gpg-init.outputs.key_fingerprint }}
        run: |
          echo "Signing artifacts with key $KEY_FINGERPRINT..."

          shopt -s nullglob

          find . -mindepth 1 -maxdepth 1 -type d ! -name '.*' -print0 | \
            while IFS= read -r -d '' dir; do
              dir_name="${dir#./}"
              echo "📁 Directory: $dir_name"

              # Sign only regular files that are not already signatures
              find "$dir" -maxdepth 1 -type f ! -name "*.asc" -print0 | \
                while IFS= read -r -d '' file; do
                  file_name=$(basename "$file")
                  echo "   📄 Signing: $file_name"

                  gpg \
                    --batch \
                    --yes \
                    --pinentry-mode loopback \
                    --local-user "$KEY_FINGERPRINT" \
                    --detach-sign \
                    --armor \
                    "$file" || {
                      echo "❌ Failed to sign $file_name"
                      exit 1
                    }
                done
            done
          echo "✅ All artifacts signed successfully."

      - name: GPG Keyring Cleanup
        id: gpg-cleanup
        if: always()
        run: |
          echo "Cleaning up GPG keyring and passphrase cache..."

          # 1. Kill agent first (clears cached passphrase)
          gpgconf --kill gpg-agent 2>/dev/null || true

          # 2. Delete keys using full fingerprint
          FINGERPRINTS=$(gpg --list-secret-keys --with-colons --fingerprint \
            | grep '^fpr' | cut -d: -f10 | sort -u)

          if [ -n "$FINGERPRINTS" ]; then
            for fpr in $FINGERPRINTS; do
              echo "Deleting key: ${fpr}"
              gpg --batch --yes --delete-secret-keys "${fpr}" 2>/dev/null || true
              gpg --batch --yes --delete-keys "${fpr}" 2>/dev/null || true
            done
          else
            echo "No secret keys found to delete."
          fi

          # 3. Final filesystem cleanup
          rm -rf ~/.gnupg

          echo "GPG keyring and passphrase cache cleaned up."

      - name: Inventory results
        working-directory: artifacts
        shell: bash
        run: |
          ls -lahR

      - name: Verify GPG signatures with provided public key
        working-directory: artifacts
        env:
          PUBLIC_KEY: ${{ vars.PUBLIC_KEY }}
        run: |
          echo "Importing verification public key..."

          # Import the public key (non-interactively)
          echo "$PUBLIC_KEY" | gpg --batch --import --pinentry-mode loopback

          # Get the fingerprint of the imported public key
          PUB_FINGERPRINT=$(gpg --list-keys --with-colons --fingerprint \
            | grep '^fpr' | head -n1 | cut -d: -f10)

          if [ -z "$PUB_FINGERPRINT" ]; then
            echo "❌ Error: No public key found after import"
            exit 1
          fi

          echo "✅ Public key imported (fingerprint: $PUB_FINGERPRINT)"
          echo "Verifying all signatures..."

          shopt -s nullglob

          find . -mindepth 1 -maxdepth 1 -type d ! -name '.*' -print0 | \
            while IFS= read -r -d '' dir; do
              dir_name="${dir#./}"
              echo "📁 Checking directory: $dir_name"

              # Find all .asc signature files and verify them
              find "$dir" -maxdepth 1 -type f -name "*.asc" -print0 | \
                while IFS= read -r -d '' sigfile; do
                  # The original file is the signature filename without .asc
                  original="${sigfile%.asc}"

                  if [ ! -f "$original" ]; then
                    echo "   ⚠️  Warning: Original file not found for $sigfile"
                    continue
                  fi

                  file_name=$(basename "$original")
                  echo "   🔍 Verifying: $file_name"

                  # Verify using the specific public key (strict check)
                  if gpg --batch --yes --pinentry-mode loopback \
                       --no-default-keyring --keyring ~/.gnupg/pubring.kbx \
                       --verify "$sigfile" "$original" 2>&1 | grep -q "Good signature"; then
                    echo "      ✅ Good signature from expected key"
                  else
                    echo "      ❌ Verification FAILED for $file_name"
                    echo "      Full output:"
                    gpg --batch --yes --verify "$sigfile" "$original"
                    exit 1
                  fi
                done
            done

          echo "✅ All signatures successfully verified with the provided public key."

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          if-no-files-found: error
          name: server-${{ github.event.inputs.tag-server }}-signed-artifacts
          path: artifacts/*/*
          retention-days: 1

  publish:

    name: Publish release

    needs: sign

    environment: release

    permissions:
      contents: write

    runs-on: ubuntu-latest

    steps:
      - name: Download signed artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: server-${{ github.event.inputs.tag-server }}-signed-artifacts
          path: signed-release

      - name: Inventory results
        working-directory: signed-release
        shell: bash
        run: |
          ls -lahR

      - name: Populate release
        uses: softprops/action-gh-release@v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.event.inputs.tag-server }}
          draft: true
          prerelease: true
          overwrite_files: false
          files: |
            signed-release/*/*
          body: |
            **libbitcoin-server [${{ github.event.inputs.tag-server }}](https://github.com/${{ github.repository_owner }}/libbitcoin-server/tree/${{ github.event.inputs.tag-server }})**

            Built from:
            - ${{ github.repository_owner }}/server [${{ github.event.inputs.tag-server }}](https://github.com/${{ github.repository_owner }}/libbitcoin-server/tree/${{ github.event.inputs.tag-server }})
            - ${{ github.repository_owner }}/node [${{ github.event.inputs.tag-node }}](https://github.com/${{ github.repository_owner }}/libbitcoin-node/tree/${{ github.event.inputs.tag-node }})
            - ${{ github.repository_owner }}/network [${{ github.event.inputs.tag-network }}](https://github.com/${{ github.repository_owner }}/libbitcoin-network/tree/${{ github.event.inputs.tag-network }})
            - ${{ github.repository_owner }}/database [${{ github.event.inputs.tag-database }}](https://github.com/${{ github.repository_owner }}/libbitcoin-database/tree/${{ github.event.inputs.tag-database }})
            - ${{ github.repository_owner }}/system [${{ github.event.inputs.tag-system }}](https://github.com/${{ github.repository_owner }}/libbitcoin-system/tree/${{ github.event.inputs.tag-system }})

            Signed with:
            ${{ vars.PUBLIC_KEY }}
